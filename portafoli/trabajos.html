<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trabajos | Cristhian Ilizarbe</title>
    <!-- SDK de Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Rajdhani', 'Segoe UI', sans-serif;
            background: #0a0010;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 20% 50%, rgba(180,0,255,0.12) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 20%, rgba(255,0,255,0.08) 0%, transparent 50%);
            pointer-events: none; z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(180,0,255,0.02) 2px, rgba(180,0,255,0.02) 4px
            );
            pointer-events: none; z-index: 0;
        }

        .header {
            position: relative; z-index: 10;
            background: rgba(10,0,20,0.9);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap;
            border-bottom: 2px solid #b400ff;
            box-shadow: 0 0 20px rgba(180,0,255,0.4);
        }

        .logo-area { display: flex; align-items: center; gap: 1rem; }
        .logo { width: 52px; height: 52px; border-radius: 10px; overflow: hidden; border: 2px solid #b400ff; box-shadow: 0 0 12px #b400ff88; }
        .logo img { width: 100%; height: 100%; object-fit: cover; }
        .facultad h3 { color: #cc44ff; font-size: 0.8rem; letter-spacing: 2px; font-family: 'Orbitron', sans-serif; }
        .facultad h2 { color: #fff; font-size: 1.1rem; font-family: 'Orbitron', sans-serif; text-shadow: 0 0 8px #b400ff; }
        .nav-menu { display: flex; gap: 1.5rem; }
        .nav-menu a {
            color: #cc44ff; text-decoration: none; font-weight: 700;
            padding: 0.5rem 1.2rem; border-radius: 4px;
            border: 1px solid #b400ff44;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem; letter-spacing: 1px; transition: all 0.3s;
        }
        .nav-menu a:hover { background: rgba(180,0,255,0.2); color: #ff00ff; border-color: #ff00ff; box-shadow: 0 0 12px #ff00ff66; }

        .container {
            position: relative; z-index: 1;
            max-width: 1200px; margin: 0 auto; padding: 2rem;
        }

        h1 {
            color: #cc44ff; text-align: center;
            margin-bottom: 2rem; font-size: 1.8rem;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 3px; text-shadow: 0 0 20px #b400ff;
        }

        /* LOADING SKELETON */
        .skeleton-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1rem; padding: 1.5rem;
        }
        .skeleton-card {
            background: rgba(30,0,55,0.5);
            border-radius: 6px; height: 130px;
            border: 1px solid #b400ff22;
            animation: pulse 1.5s ease-in-out infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 0.8; }
        }
        .skeleton-header {
            height: 54px; background: rgba(120,0,200,0.3);
            border-radius: 8px 8px 0 0; margin-bottom: 1rem;
            animation: pulse 1.5s ease-in-out infinite;
        }

        .unidad {
            background: rgba(20,0,40,0.7);
            backdrop-filter: blur(8px);
            border-radius: 8px; margin-bottom: 2rem;
            overflow: hidden; border: 1px solid #b400ff44;
            box-shadow: 0 0 20px rgba(180,0,255,0.1);
        }

        .unidad-header {
            background: linear-gradient(135deg, rgba(120,0,200,0.8), rgba(180,0,255,0.6));
            padding: 1rem 1.5rem; cursor: pointer;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #b400ff66; transition: all 0.3s;
        }

        .unidad-header:hover { background: linear-gradient(135deg, rgba(180,0,255,0.8), rgba(255,0,255,0.5)); }

        .unidad-header h2 {
            color: white; font-size: 1.2rem;
            font-family: 'Orbitron', sans-serif; letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .unidad-header span { color: #ff00ff; font-size: 1.5rem; transition: transform 0.3s; }

        .semana-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; padding: 1.5rem; }

        .semana-card {
            background: rgba(30,0,55,0.8); border-radius: 6px;
            padding: 1.5rem 1rem; text-align: center;
            transition: all 0.3s; cursor: pointer;
            border: 1px solid #b400ff33; position: relative; overflow: hidden;
        }

        .semana-card::before {
            content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
            background: linear-gradient(90deg, #b400ff, #ff00ff);
            opacity: 0; transition: opacity 0.3s;
        }
        .semana-card:hover::before { opacity: 1; }
        .semana-card:hover {
            transform: translateY(-5px); border-color: #b400ff;
            box-shadow: 0 10px 30px rgba(180,0,255,0.3);
            background: rgba(50,0,80,0.9);
        }

        .semana-numero {
            background: transparent; border: 2px solid #b400ff;
            color: #ff00ff; width: 50px; height: 50px;
            border-radius: 4px; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 0.8rem; font-weight: 900; font-size: 1.3rem;
            font-family: 'Orbitron', sans-serif; box-shadow: 0 0 12px #b400ff66;
        }

        .semana-titulo { font-weight: 700; color: #d4a0ff; margin-bottom: 0.5rem; font-size: 0.95rem; letter-spacing: 0.5px; }

        .semana-estado {
            font-size: 0.72rem; padding: 0.3rem 0.8rem; border-radius: 3px;
            display: inline-block; margin-top: 0.5rem;
            font-family: 'Orbitron', sans-serif; letter-spacing: 1px; font-weight: 700;
        }

        .estado-completado { background: rgba(0,200,100,0.2); color: #00ff88; border: 1px solid #00ff8866; }
        .estado-subido { background: rgba(0,100,255,0.2); color: #44aaff; border: 1px solid #44aaff66; }
        .estado-pendiente { background: rgba(180,0,255,0.2); color: #cc44ff; border: 1px solid #b400ff66; }

        .repo-link {
            display: inline-block; margin-top: 0.8rem;
            color: #b400ff; text-decoration: none;
            font-size: 0.72rem; font-weight: 700;
            font-family: 'Orbitron', sans-serif; letter-spacing: 1px;
        }
        .repo-link:hover { color: #ff00ff; text-shadow: 0 0 8px #ff00ff; }

        footer {
            position: relative; z-index: 1; text-align: center;
            padding: 2rem; color: #7733aa;
            border-top: 1px solid rgba(180,0,255,0.3);
            margin-top: 2rem;
            font-family: 'Orbitron', sans-serif; font-size: 0.75rem; letter-spacing: 2px;
        }

        /* MODAL */
        .modal {
            display: none; position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85); z-index: 1000;
            align-items: center; justify-content: center; padding: 1rem;
        }
        .modal.show { display: flex; }

        .modal-content {
            background: rgba(15,0,30,0.98);
            border: 1px solid #b400ff; border-radius: 8px;
            padding: 2rem; max-width: 550px; width: 100%;
            box-shadow: 0 0 40px rgba(180,0,255,0.5);
            max-height: 80vh; overflow-y: auto;
        }

        .modal-content h3 {
            color: #ff00ff; font-family: 'Orbitron', sans-serif;
            font-size: 1rem; letter-spacing: 1px; margin-bottom: 1rem;
            text-shadow: 0 0 10px #ff00ff66;
        }

        .modal-content p { color: #d4a0ff; line-height: 1.7; margin-bottom: 1rem; }

        .archivos-lista { margin: 1rem 0; }
        .archivos-lista ul { list-style: none; }
        .archivos-lista li {
            padding: 0.5rem; border-bottom: 1px solid #b400ff22;
            display: flex; flex-direction: column; gap: 0.3rem;
        }
        .archivos-lista a { color: #ff00ff; text-decoration: none; word-break: break-all; }
        .archivos-lista a:hover { text-shadow: 0 0 8px #ff00ff; }

        .close-modal {
            background: transparent; color: #ff00ff;
            border: 1px solid #ff00ff; padding: 0.5rem 1.5rem;
            border-radius: 4px; margin-top: 1rem; cursor: pointer;
            font-family: 'Orbitron', sans-serif; font-size: 0.8rem; letter-spacing: 2px; transition: all 0.3s;
        }
        .close-modal:hover { background: rgba(255,0,255,0.15); box-shadow: 0 0 12px #ff00ff66; }

        .badge-archivos {
            display: inline-block; background: rgba(180,0,255,0.2); color: #cc44ff;
            font-size: 0.68rem; padding: 0.2rem 0.6rem; border-radius: 3px;
            margin-top: 0.5rem; border: 1px solid #b400ff44;
            font-family: 'Orbitron', sans-serif;
        }

        /* Error state */
        .error-msg {
            text-align: center; color: #ff4444;
            font-family: 'Orbitron', sans-serif; font-size: 0.85rem;
            padding: 2rem; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="logo-area">
            <div class="logo"><img src="imagenes/descarga.png" alt="Logo UPLA"></div>
            <div class="facultad">
                <h3>FACULTAD DE INGENIERÍA</h3>
                <h2>Sistemas y Computación</h2>
            </div>
        </div>
        <div class="nav-menu">
            <a href="index.html">INICIO</a>
            <a href="trabajos.html">TRABAJOS</a>
            <a href="login.html">LOGIN</a>
        </div>
    </div>

    <div class="container">
        <h1>⬡ PLAN DE ESTUDIOS — BASE DE DATOS II</h1>
        <div id="unidades-container"></div>
    </div>

    <!-- Modal detalle -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <h3 id="modal-titulo"></h3>
            <p id="modal-descripcion"></p>
            <div id="modal-archivos" class="archivos-lista"></div>
            <div id="modal-enlace-container"></div>
            <button class="close-modal" onclick="cerrarModal()">✕ CERRAR</button>
        </div>
    </div>

    <footer>© 2026 | INGENIERÍA DE SISTEMAS | PORTAFOLIO ACADÉMICO | BASE DE DATOS II</footer>

    <script>
        // =============================================
        // CONFIGURACIÓN SUPABASE
        // =============================================
        const SUPABASE_URL = 'https://ayvfxfzfomoirhmxgnxb.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_KfwHIYQWSZW9077UsYzyLA_lSIRMccq';
        const { createClient } = supabase;
        const db = createClient(SUPABASE_URL, SUPABASE_KEY);

        // =============================================
        // ESTRUCTURA BASE
        // =============================================
        const UNIDADES = {
            1: "Unidad 1 - Optimización y Transacciones",
            2: "Unidad 2 - Programación en Servidor",
            3: "Unidad 3 - Bases de Datos NoSQL",
            4: "Unidad 4 - Administración y Seguridad"
        };

        let trabajos = {};

        function inicializarEstructura() {
            for (let u = 1; u <= 4; u++) {
                trabajos[u] = { nombre: UNIDADES[u], semanas: {} };
                for (let s = 1; s <= 4; s++) {
                    const sg = (u - 1) * 4 + s;
                    trabajos[u].semanas[sg] = {
                        titulo: `Semana ${sg}`,
                        descripcion: `Trabajo de la Semana ${sg} - ${UNIDADES[u]}`,
                        enlace: '#', estado: 'pendiente', archivos: []
                    };
                }
            }
        }

        // =============================================
        // MOSTRAR SKELETON MIENTRAS CARGA
        // =============================================
        function mostrarSkeleton() {
            const container = document.getElementById('unidades-container');
            let html = '';
            for (let u = 1; u <= 4; u++) {
                html += `
                    <div class="unidad">
                        <div class="skeleton-header"></div>
                        <div class="skeleton-grid">
                            ${Array(4).fill('<div class="skeleton-card"></div>').join('')}
                        </div>
                    </div>`;
            }
            container.innerHTML = html;
        }

        // =============================================
        // CARGAR DESDE SUPABASE
        // =============================================
        async function cargarTrabajos() {
            mostrarSkeleton();
            inicializarEstructura();

            const { data, error } = await db
                .from('trabajos')
                .select('*')
                .order('semana', { ascending: true });

            if (error) {
                document.getElementById('unidades-container').innerHTML =
                    `<div class="error-msg">⚠ Error al cargar datos desde Supabase.<br><small>${error.message}</small></div>`;
                return;
            }

            // Mezclar datos de Supabase con la estructura base
            data.forEach(row => {
                const u = row.unidad;
                const sg = row.semana;
                if (trabajos[u] && trabajos[u].semanas[sg]) {
                    trabajos[u].semanas[sg].titulo = row.titulo || `Semana ${sg}`;
                    trabajos[u].semanas[sg].descripcion = row.descripcion || '';
                    trabajos[u].semanas[sg].enlace = row.enlace || '#';
                    trabajos[u].semanas[sg].estado = row.estado || 'pendiente';
                    trabajos[u].semanas[sg].archivos = row.archivos || [];
                }
            });

            renderizarUnidades();
        }

        // =============================================
        // HELPERS
        // =============================================
        function getEstadoClass(e) {
            if (e === 'completado') return 'estado-completado';
            if (e === 'subido') return 'estado-subido';
            return 'estado-pendiente';
        }

        function getEstadoText(e) {
            if (e === 'completado') return '✓ COMPLETADO';
            if (e === 'subido') return '↑ SUBIDO';
            return '⏳ PENDIENTE';
        }

        // =============================================
        // RENDERIZAR
        // =============================================
        function renderizarUnidades() {
            const container = document.getElementById('unidades-container');
            let html = '';
            for (let u = 1; u <= 4; u++) {
                const unidad = trabajos[u];
                if (!unidad) continue;
                html += `
                    <div class="unidad">
                        <div class="unidad-header" onclick="toggleUnidad(${u})">
                            <h2>⬡ ${unidad.nombre}</h2>
                            <span id="arrow-${u}">▼</span>
                        </div>
                        <div id="unidad-${u}" class="semana-grid">
                `;
                for (let s = 1; s <= 4; s++) {
                    const sg = (u - 1) * 4 + s;
                    const semana = unidad.semanas[sg];
                    if (!semana) continue;
                    const tieneArchivos = semana.archivos && semana.archivos.length > 0;
                    html += `
                        <div class="semana-card" onclick="verTrabajo(${u}, ${sg})">
                            <div class="semana-numero">${sg}</div>
                            <div class="semana-titulo">${semana.titulo}</div>
                            <div class="semana-estado ${getEstadoClass(semana.estado)}">${getEstadoText(semana.estado)}</div>
                            ${tieneArchivos ? `<div class="badge-archivos">📎 ${semana.archivos.length} archivo(s)</div>` : ''}
                            ${semana.enlace && semana.enlace !== '#'
                                ? `<a href="${semana.enlace}" class="repo-link" target="_blank" onclick="event.stopPropagation()">⬡ GITHUB</a>`
                                : '<span class="repo-link" style="color:#440066;">⬡ GITHUB</span>'}
                        </div>
                    `;
                }
                html += `</div></div>`;
            }
            container.innerHTML = html;
        }

        function toggleUnidad(id) {
            const div = document.getElementById(`unidad-${id}`);
            const arrow = document.getElementById(`arrow-${id}`);
            if (div.style.display === 'none') { div.style.display = 'grid'; arrow.textContent = '▼'; }
            else { div.style.display = 'none'; arrow.textContent = '▶'; }
        }

        function verTrabajo(unidad, sg) {
            const semana = trabajos[unidad].semanas[sg];
            document.getElementById('modal-titulo').textContent = `${UNIDADES[unidad]} — ${semana.titulo}`;
            document.getElementById('modal-descripcion').innerHTML = semana.descripcion || `Trabajo de la ${semana.titulo}`;

            const enlaceContainer = document.getElementById('modal-enlace-container');
            enlaceContainer.innerHTML = semana.enlace && semana.enlace !== '#'
                ? `<a href="${semana.enlace}" target="_blank" style="color:#ff00ff; display:inline-block; margin:0.5rem 0;">⬡ Ver repositorio en GitHub</a>`
                : '';

            const archivosContainer = document.getElementById('modal-archivos');
            const archivos = semana.archivos || [];
            if (archivos.length > 0) {
                let h = '<h4 style="color:#cc44ff; font-family:Orbitron,sans-serif; font-size:0.85rem; margin-bottom:0.75rem;">📎 Archivos adjuntos:</h4><ul>';
                archivos.forEach(archivo => {
                    const ext = archivo.nombre.split('.').pop().toLowerCase();
                    const icono = ext === 'pdf' ? '📑' : ['ppt','pptx'].includes(ext) ? '📊' : ['doc','docx'].includes(ext) ? '📝' : ['jpg','jpeg','png','gif'].includes(ext) ? '🖼️' : ext === 'zip' ? '🗜️' : '📄';
                    const esImagen = ['jpg','jpeg','png','gif','webp'].includes(ext);
                    h += `<li style="padding:0.75rem 0; border-bottom:1px solid #b400ff22;">
                        <div style="display:flex; align-items:center; gap:0.5rem; margin-bottom:0.5rem;">
                            <span>${icono}</span>
                            <strong style="color:#d4a0ff;">${archivo.nombre}</strong>
                            ${archivo.tamaño ? `<small style="color:#553388;">(${Math.round(archivo.tamaño/1024)} KB)</small>` : ''}
                        </div>
                        ${esImagen ? `<img src="${archivo.url}" alt="${archivo.nombre}" style="max-width:100%; border-radius:6px; border:1px solid #b400ff44; margin-bottom:0.5rem;">` : ''}
                        <div style="display:flex; gap:1rem;">
                            <a href="${archivo.url}" target="_blank" style="color:#ff00ff; font-size:0.85rem;">👁 Ver</a>
                            <a href="${archivo.url}" download="${archivo.nombre}" style="color:#cc44ff; font-size:0.85rem;">⬇ Descargar</a>
                        </div>
                    </li>`;
                });
                h += '</ul>';
                archivosContainer.innerHTML = h;
            } else {
                archivosContainer.innerHTML = '<p style="color:#553388;">📂 No hay archivos adjuntos para esta semana</p>';
            }

            document.getElementById('modal').classList.add('show');
        }

        function cerrarModal() {
            document.getElementById('modal').classList.remove('show');
        }

        // Cerrar modal con Escape
        document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal(); });

        // =============================================
        // INICIO
        // =============================================
        cargarTrabajos();
    </script>
</body>
</html>
