<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Cristhian Ilizarbe</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0a0010;
            font-family: 'Rajdhani', 'Segoe UI', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
            overflow: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 30% 50%, rgba(180,0,255,0.15) 0%, transparent 60%),
                radial-gradient(ellipse at 70% 30%, rgba(255,0,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }

        body::after {
            content: '';
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: repeating-linear-gradient(
                0deg, transparent, transparent 2px,
                rgba(180,0,255,0.02) 2px, rgba(180,0,255,0.02) 4px
            );
            pointer-events: none;
        }

        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            background: rgba(10, 0, 20, 0.9);
            backdrop-filter: blur(12px);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            border-bottom: 2px solid #b400ff;
            box-shadow: 0 0 20px rgba(180,0,255,0.4);
            z-index: 100;
        }

        .logo-area { display: flex; align-items: center; gap: 1rem; }

        .logo {
            width: 52px; height: 52px;
            border-radius: 10px; overflow: hidden;
            border: 2px solid #b400ff;
            box-shadow: 0 0 12px #b400ff88;
        }

        .logo img { width: 100%; height: 100%; object-fit: cover; }

        .facultad h3 {
            color: #cc44ff; font-size: 0.8rem;
            letter-spacing: 2px;
            font-family: 'Orbitron', sans-serif;
        }

        .facultad h2 {
            color: #ffffff; font-size: 1.1rem;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 8px #b400ff;
        }

        .nav-menu { display: flex; gap: 1.5rem; }

        .nav-menu a {
            color: #cc44ff; text-decoration: none; font-weight: 700;
            padding: 0.5rem 1.2rem; border-radius: 4px;
            border: 1px solid #b400ff44;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem; letter-spacing: 1px;
            transition: all 0.3s;
        }

        .nav-menu a:hover {
            background: rgba(180,0,255,0.2);
            color: #ff00ff; border-color: #ff00ff;
            box-shadow: 0 0 12px #ff00ff66;
        }

        /* Login Card */
        .login-card {
            position: relative;
            z-index: 10;
            background: rgba(15, 0, 30, 0.92);
            padding: 2.5rem;
            border-radius: 8px;
            width: 400px;
            text-align: center;
            margin-top: 80px;
            border: 1px solid #b400ff66;
            box-shadow: 0 0 40px rgba(180,0,255,0.3), inset 0 0 40px rgba(180,0,255,0.05);
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: -2px; left: -2px; right: -2px; bottom: -2px;
            background: linear-gradient(45deg, #b400ff, #ff00ff, #7700cc, #b400ff);
            background-size: 400%;
            border-radius: 8px;
            z-index: -1;
            animation: borderGlow 4s linear infinite;
            opacity: 0.5;
        }

        @keyframes borderGlow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .robot-mini {
            width: 70px; height: 70px;
            background: linear-gradient(145deg, #7700cc, #b400ff);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1rem;
            border: 2px solid #ff00ff;
            box-shadow: 0 0 20px #b400ff88;
        }

        .login-card h2 {
            color: #ff00ff;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            letter-spacing: 2px;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 10px #ff00ff66;
        }

        .login-card p {
            color: #9955cc;
            margin-bottom: 1.5rem;
            font-size: 0.95rem;
            letter-spacing: 1px;
        }

        .cyber-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, #b400ff, #ff00ff, #b400ff, transparent);
            margin: 1rem 0;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            margin: 8px 0;
            background: rgba(180,0,255,0.08);
            border: 1px solid #b400ff66;
            border-radius: 4px;
            font-size: 1rem;
            color: #e0b0ff;
            outline: none;
            transition: 0.3s;
            font-family: 'Rajdhani', sans-serif;
            letter-spacing: 1px;
        }

        input::placeholder { color: #6633aa; }

        input:focus {
            border-color: #ff00ff;
            box-shadow: 0 0 12px #ff00ff44;
            background: rgba(180,0,255,0.15);
        }

        button {
            background: transparent;
            color: #ff00ff;
            border: 1px solid #ff00ff;
            padding: 12px;
            width: 100%;
            border-radius: 4px;
            font-weight: 700;
            font-size: 0.9rem;
            cursor: pointer;
            margin-top: 1rem;
            transition: 0.3s;
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 2px;
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,0,255,0.3), transparent);
            transition: left 0.4s;
        }

        button:hover::before { left: 100%; }

        button:hover {
            background: rgba(255,0,255,0.15);
            box-shadow: 0 0 20px #ff00ff66;
        }

        .error {
            color: #ff4488;
            margin-top: 1rem;
            font-size: 0.9rem;
            text-shadow: 0 0 8px #ff448866;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-area">
            <div class="logo">
                <img src="imagenes/descarga.png" alt="Logo UPLA">
            </div>
            <div class="facultad">
                <h3>FACULTAD DE INGENIERÍA</h3>
                <h2>Sistemas y Computación</h2>
            </div>
        </div>
        <div class="nav-menu">
            <a href="index.html">INICIO</a>
            <a href="trabajos.html">TRABAJOS</a>
            <a href="login.html">LOGIN</a>
        </div>
    </div>

    <div class="login-card">
        <div class="robot-mini">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none">
                <path d="M12 2C10 2 8 3 8 5H16C16 3 14 2 12 2Z" fill="white"/>
                <rect x="4" y="5" width="16" height="14" rx="2" fill="white"/>
                <circle cx="9" cy="10" r="1.5" fill="#b400ff"/>
                <circle cx="15" cy="10" r="1.5" fill="#b400ff"/>
                <rect x="11" y="13" width="2" height="4" fill="#b400ff"/>
            </svg>
        </div>
        <h2>ACCESO ADMINISTRADOR</h2>
        <p>Ingresa para gestionar tus trabajos</p>
        <div class="cyber-line"></div>
        <div id="loginForm">
            <input type="text" id="username" placeholder="▶ USUARIO" autocomplete="off">
            <input type="password" id="password" placeholder="▶ CONTRASEÑA">
            <button onclick="handleLogin()">⬡ INGRESAR AL PANEL</button>
        </div>
        <div id="errorMsg" class="error"></div>
    </div>

    <script>
        function handleLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            if (username === "cristhian" && password === "123456") {
                localStorage.setItem('adminLogged', 'true');
                window.location.href = "admin.html";
            } else {
                document.getElementById('errorMsg').innerText = "⚠ Usuario o contraseña incorrectos";
            }
        }

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
